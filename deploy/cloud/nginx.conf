server {
    listen 80;
    server_name mirror.your-domain.com;

    # Static frontend
    location / {
        proxy_pass http://127.0.0.1:8773;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API endpoints
    location /api/ {
        proxy_pass http://127.0.0.1:8773;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }
}
